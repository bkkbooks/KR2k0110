body:
  text: 嶽陽風土記宋范致明撰嶽州南鄰蒼梧之野古三苗國地又為麇子國春秋文公十一年楚子伐麇即此地也戰國末屬楚羅子國秦并天下為長沙郡漢因之以為要扼之地置戍以鎮之建安中吳使魯肅將兵萬人屯駐於此吳録云晉分長沙之邑為巴陵等縣置建昌郡在巴陵今州即建昌郡也以陶侃鎮之後省入長沙至宋文帝又分其地置巴陵郡齊武帝永明二年封子子倫為巴陵王遂為巴陵王國子倫為明帝所害梁武帝封齊明帝子保義為巴陵王奉後以繼三恪元帝都荆州立巴陵郡武帝末湘東王遣陸法和等據赤亭湖即其地因以名之後平陳廢郡改為巴陵縣煬帝元年改為玉州又改為羅州三年又改為巴陵縣唐武德四年蕭銑置巴陵郡華容沅江及汨羅湘隂五縣六年改為嶽州省羅縣天寶元載改為巴陵縣乾元元年復為嶽州至南唐遂為周行逢所有𨽻武平軍節度武平舊朗州今鼎州是也是時猶屬湖南皇朝下荆南始𨽻湖北巴陵荆湖二流之合昭烈既定蜀孫權往求荆州不得使魯肅以萬人屯之輿地志云巴丘有大屯戍魯肅守之今郡城乃魯公所築也酈道元水經注云巴陵山有湖水岸上有巴陵本吳之邸閣城也城郭殊隘迫所容不過數萬人而官舍民居在其內州地客山髙主山隱伏不甚利土人而僑居多興葺者俗謂之扁擔州皇朝嶽州領巴陵華容臨湘平江沅江五縣元豐末鄂州通城縣𨽻嶽州其後又以沅江隔湖割𨽻鼎州而通城復鄂今領四縣嶽州常賦之外與他州名額不同者茶籠竹箭簳翎毛魚麴蘆蒢鐵葉窑竈巴陵本下雋縣之丘漢書地理志下雋縣屬長沙郡按今在鄂州蒲圻縣界此其地耳水經所謂本吳之巴丘邸閣城也晉平康元年立巴陵縣於此後置建昌郡宋元嘉十六年立巴陵郡城跨岡嶺濵阻三江蓋巴陵對長洲其洲南分湖浦東北屆大江故曰三江也三水所會亦或謂之三江口夾洲列關亦謂之巴陵關江記言羿屠巴蛇於洞庭積其骨為陵淮南子曰斬蛇於洞庭今巴蛇冢在州院廳側巍然而髙草朩叢翳張燕公有登巴丘望墨山之詩兼有巴蛇廟在嶽陽門內太守歐頴廢之嶽陽樓城西門樓也下瞰洞庭景物寬闊唐開元四年中書令張説除守此州每與才士登樓賦詩自爾名著其後太守於樓北百步復創樓名曰燕公樓山海經言洞庭沅澧之交瀟湘之淵是為九江之門按澧鼎沅湘合諸蠻黔南之水匯為洞庭至巴陵與荆江合而東州據其上水經云湘水右會小青口資水也世謂之益陽江右則沅水注之謂之橫房口東到微湖世謂之糜湖西流注為江謂之糜湖口左則澧水謂之武陵江凡此五水注為洞庭北會為大江名曰五瀦戰國䇿曰秦與荆戰大破之襲郢取洞庭五瀦楚辭帝子降兮北瀦皆其地也寰宇記云郡有青草洞庭巴丘三湖青草湖中有青草山冬春水退皆青草也洞庭洞府之庭上有洞庭真君廟堂巴丘之名今不著青草湖在壘石山與洞庭相通其南羅水出焉故羅縣在其上其東汨水出焉下有潭謂之屈原潭屈原懷沙自溺之所忠潔侯三閭大夫廟在其上樂史言大江在巴陵東北流入洞庭今洞庭水會于江非江流入洞庭也荆江出巴蜀自髙注下濁流洶湧夏秋暴漲則逆泛洞庭瀟湘清流頓皆混濁嶽人謂之翻流水南至青草湖或三五日乃還俗云水神朝君山嶽陽井邑舊皆瀕江郡城西數百步屢年湖水潄齧今去城數十步即江岸父老相傳今江心舊闤闠也瀕江沙磧地尚有稅絹甚重云祖來宅稅今不曾除改北津舊去城角數百步今逼近石觜蓋荆江日漱而南湘江日漱而東也江西沙洲舊長洲今名鱘魚觜昔傳有異人云觜生過嶽陽樓即出狀元嶽陽樓舊岸有港名駝鶴港商人泊船於此地勝千石載今巳湮沒如平陸不復通舟尾通君山後湖丁晉公南遷還嶽陽見江西新生洲云此洲生當有真人臨此皇祐二年英宗以團練使鎮嶽州及登寶位果符其説嶽陽樓上有吕先生留題云朝遊北越暮蒼梧袖裏青蛇膽氣粗三入嶽陽人不識朗吟飛過洞庭湖今不見當時墨迹但有刻石耳先生名岩字洞賔河中府人唐禮部尚書渭之孫渭四子溫恭儉讓讓終海州刺史先生海州出也會昌中兩舉進士不第即有棲隱之志去遊廬山遇異人授劒術得長生不死之訣多遊湘潭鄂嶽間或賣紙墨于市以混俗人莫之識也慶厯中天章閣待制滕宗諒坐事謫守嶽陽一日有刺謁云回巖客子京曰此吕洞賔也變易姓名爾召坐置酒髙談劇飲佯若不知者密令畫工傳其狀貌既去來日使人復召之客舍主人曰先生半夜去矣留書以遺子京子京視之默然不知所言何事也今嶽陽樓傳本狀貌清俊與俗本特異楚澤門碧湘門舊甕城門也楚澤門經火不復完治今但有遺址灉湖在州南春冬水涸昔人謂之乾湖水經謂之滃湖秋夏水漲即渺瀰勝千石舟通閣子鎮灉湖諸山舊出茶謂之灉湖茶李肇所謂嶽州灉湖之含膏也唐人極重之見於篇什今人不甚種植惟白鶴僧園有千餘本土地頗類此苑所出茶一歲不過一二十兩土人謂之白鶴茶味極甘香非他處草茶可比並茶園地色亦相類但土人不甚植爾灉湖井唐人嘗稱甘水今荒穢不治汲者亦少當不逮昔也魯將軍廟在會泉門外乃魯肅廟也孫權使肅守巴丘後人祀之昭烈既與肅畫湘為界遂築地烏沙鎮對壘在州北六十里俗謂之金門劉備城南樓陽公臺皆見嶽陽詩咏今並無遺迹可踐或云楚澤門舊南樓也今廢孟浩然洞庭詩有波撼嶽陽城蓋城據湖東北湖靣百里常多西南風夏秋水漲濤聲喧如萬鼓晝夜不息漱齧城岸歲常傾頽滕子京待制欲為偃虹隄以捍之計成而滕移郡後遂不果江岸沙磧中有冶鐵數枚俗謂鐵枷重千斤古人鑄鐵如燕尾相向中有大竅徑尺許不知何用也或云以此壓勝辟蛟蜃之患或以為矴石疑其太重非舟人所能舉也或以為置朩其內編以為柵以禦風濤皆不可知龍興觀故基在太平寺東舊有西閣為登覽之勝見滕公詩咏皮日休陸龜蒙亦為觀步之什今治平寺江路兩山間林朩邃密故基存焉天禧中賜名天慶昔時觀名因而泯沒白鶴老松古朩精也李觀守賀州有道人陳某自云一百三十六歲因言及吕洞賔曰近在南嶽見之吕云過嶽陽日憩城南古松隂有人自杪而下來相揖曰某非山精朩魅故能識先生幸先生哀憐吕因與丹一粒贈之以詩吕舉以示陳陳記其末云惟有城南老樹精分明知道神仙過明日陳行留之不可後年餘李守嶽陽因訪前事果城南有老松以問近寺僧曰先生舊題詩寺壁久巳摧毁但能記其詩曰獨自行來獨自坐無限世人不識我惟有城南老樹精分明知道神仙過後為亭松前曰過仙亭舊松枯稿今復鬱茂得非丹餌之力邪隋末校尉董景珍率鄭文秀共立蕭銑為梁後乃封景珍為晉王文秀為楚王今北廟董王廟南廟鄭王廟也圖經以鄭王廟為巴陵令鄭德璘昔遇洞庭君者非也海眼池在嵩州夾舊傳濳通江海今湖泥湮沒不復如昔紫溪臺亦曰紫荆臺在灉湖上下有石髙四尺曰紫溪石南廟乃孝烈靈妃孝感侯廟秦武陵令羅君用因督鐵運溺水死其女挈弟尋父尸不獲遂相繼赴水死邦人哀而祀之謂之羅娘廟靈響寖著凡有舟楫往還祈之利涉後唐明宗天成二年丁亥湖南馬殷承制列姊在左弟在右元豐中始賜今封嶽人禱祠無虗日舊在烏龜渡南祝者以為不便託言神意遂移今廟按李瀕寄遠詩曰化石早曾聞節婦沈湘何必獨靈妃其意似與今聞差異董景珍鄭文秀既立蕭銑為梁後築臺城南今失其處崔櫓有登嶽陽樓雲夢亭夜登洞庭樓三詩今雲夢洞庭亭樓莫知其處太平寺舊傳為屈原宅蓋屈原被逐寓此廣教寺後唐永安寺舊為聖善寺故基昔吕雲卿遇江叟於聖善寺吹笛召洞庭諸龍即其地也金雞白石在船場舊步有金雞翔其上剪刀池在郡城東北隅或云池中有鼎耳髙數尺其中容人往來上有識文善泅者常見之靈妃廟有銅鼓元豐中永慶莊耕者得之圓口方耳下有方趺皆古篆雲雷文色正青緑形制精巧非近世所能為也取置於寺太守李觀用耆舊之説以為陸賈使南越嘗以銅鼓獻之於廟歲久失之意其必此遂移置廟中方移置時護持不謹因誤毁損今巳不完或云聞初獲鼓時同獲銅鐸一枚以其完好輦致禮部今藏祕書省鼓以毁壞遂留永慶寺李觀之説似非其實沈亞之作湘中怨云鄭子况為嶽陽太守因上巳日攜家登嶽陽樓下望鄂渚鄭追想汜人俄有所見聞汜人歌曰沂青山兮江之湄泳湖波兮裊緑裾意拳拳兮心莫舒舟中人亦歌非樓上之人所能辨洞庭湖岸有石井二相去數百步俗號秦皇井其泉甚甘美閣子湖本角子湖語訛以其在洞庭之角故謂之角子湖灉湖亦謂之閣子湖楊行密以朩籠鎖舟之地或謂瀕湖地卑歲苦水患民多重屋以居故謂之閣子湖湘州記云嶽州有昭潭其下無底湘水最深處今嶽州無昭潭昭潭自屬潭州閣子鎮有隄曰白荆隄石壁潭在其下亦謂之釣絲潭其深莫測夏秋水漲一日之間或增或減土人以為龍出入此潭其間多蛟蜃為行旅之患滕子京作碑隄上戒往來者使陸行啞潭在白荆隄側歲壞邦人方完築忽有大鯉魚躍其中役夫殺而食之往往皆死然瀕江漁人不以魚之長大為竒怪但釣網不能制者皆殺之不知此又何也水經云湖水廣五百里日月出沒其中大抵湖上舟行雖泝流而遇順風加之人力自旦及暮可行二百里嶽陽西到華容過大穴漠汴湖一日程又西到澧江口鼎州江口皆通大穴漠赤沙三日程南至沅江過赤鼻山湖四日程又東至湘江過磊石青草湖兩日程夏秋水漲其道如此冬春水落往往淺澀江道回曲或遠或近雖無風濤之患而常靠閣洞庭山之北宜春口出焉韓退之詩朝發宜春口即此地也鼓樓山上有石室下瞰洞庭中容數千人羣盜逋藏之所俗謂分金洞統制官巡捕後遂少衰息按水經云洞庭鹿角山西有謹亭戍萬石戍糜湖口有金浦戍然則屯兵捕盜舊矣烏石山在州南所謂烏頭石也其地五山相峙亦名五龍山下有港曰石墨港水中石如墨磨咽之可愈喉膈壅熱之疾或云亦可代墨用君山在洞庭湖中昔人有詩云四顧疑無地中流忽有山正謂此也夏秋水漲皆巨浸不可以陸行往近年冬深水落渡江肩舁以遊上有廟曰淵德侯洞庭君廟舊祠以為湘君遂以為二妃誤也上有野馬數十匹蓋昔之所獻馬歲久滋生山多古朩少草夏秋食朩皮多餓死故其數不充廣君山崇勝寺舊楚興寺也有井曰柳毅井按靈姻傳始言還湘濵中言將歸吳國固無定處然則前人因事闕文後人遂以為實此亦好事者之過也荆州記言君山上有道通吳之苞山今太湖亦有洞庭山亦濳通君山故得名耳山後響沙頓足聽之有聲酈善長言君山有石穴濳通吳之苞山郭景純謂巴陵是湘君所遊處故曰君山湘州記言秦皇欲入湘觀衡山遇風濤漂溺到此山而免因號君山或言秦皇遭風於此問博士曰湘君何神曰堯女舜妃也神遊洞庭之湖出入多風雨秦皇大怒乃赭其山漢武帝亦發卒以射蛟郡國志洞庭山院堯女居之內有君山然則君山洞庭之分耳博物志云君山即洞庭之山堯之二女居之長曰湘君次曰湘夫人今黃陵廟二妃廟也庾穆之湘州記云君山上有美酒數斗得飲之即不死為神仙漢武帝聞之齋居七日遣欒巴將童男女數十人來求之果得酒進御未飮東方朔在旁竊飮之帝大怒將殺之朔曰使酒有驗殺臣亦不死無驗安用酒為帝笑而釋之寺僧云春時往往聞酒香尋之莫知其處君山虎洞石穴夏秋水漲即沒春冬水落即露朝廷嘗遣使投龍于此歲旱邦人往往祈禱焉君山東對艑山山多竹兩山相去數十里回峙相望孤影若浮湘人以吳船為艑山形類之故以名山上有塔曰啞女塔舊傳有商女祟病至此忽能言指其上可置塔其家為之置塔因以名焉通典州郡録云巴丘湖中有曹洲即曹公為吳所敗燒船處在今縣南四十里按縣西有曹公渡考之地理與周瑜曹公相遇處絶不相干不知何所據而言也楊潭岸在荆江舊大湖也水經云江中有觀溠溠東有大洲洲東分為爵洲南對湘江口分觀溠口徐師港在三江口北三十里爵洲在三江口南四十里又曰湘山迤於巴丘北謂之射獵磯江浦之右岸在城陵山山有故侯景港乃侯景泊舟師之所雲夢澤寰宇記曰半在江南半在江北其水中土丘半出杜預所謂雲夢藪巴丘湖是也酈道元謂自江陵東界為雲夢藪孟浩然詩氣蒸雲夢澤然則夾江南北皆其地也麇子東西兩城春秋時楚昭王奔隨王使王孫由於城麇永慶寺莊山頂有井水泉清徹僧齊巳詩云鳥從井口出僧自嶽陽還楓橋堡有古冢歲久傾圮耕者得磚上有文曰大唐秦公墓堂皇扄固不可發縣令秦光享為封完之諸邑僧寺大小百區多五代時所建太平興國五年鼎嶽始改賜寺額者乾明寺舊永慶寺也昔謂之新開寺雪竇語録所謂新開者乾明祖師也嶽陽舊𨽻武安軍日有天䇿府户部下免楚興寺科率帖開運三年二月二十四日文字係書吏人稱典稱副驅使官簽書官桂管觀察處官王天府學士鎮南軍節度判內諸司馬武穆亦自係天䇿府將軍江南諸道都統尚書令楚王銜後書押蓋五代時藩鎮行移百餘紙如郡椽曹縣令長皆攝至祥符已後始書正官稱有稱天䇿府知客元監州發運使序銜在知軍之下監州恐今通判職發運使蓋藩鎮轉輸之官耳亦恐是監州之類巳上簽書官稱乃開運二年帖也嶽州地極熱十月猶單衣或搖扇蛙鳴似夏鳥鳴似春濃雲踈星震雷暴雨如中州六七月間瀕江水退漁人於沙磧得箭鏃甚多形製不一皆銅為之歲有得十數者足以見前代爭戰之衝也嶽州北瀕江州郡氣候尤熱夏月南風則鬱蒸特甚蓋湖南千里無山多得日色故少隂涼之氣也居民每至夏秋多病痢瘧皆暑濕所致也洞庭湖中舊有蚌其大如半席深夜側立一殼乘風往來煙波間中吐巨珠與月相射漁者百端取之終莫可得近久不見嶽州夏秋水漲即生飛蛾蔽空而飛夜見明即投至不可燃燭雖樽俎之間須臾遍滿久之復投水中俗謂天蛾嶽州人極重鰉魚子每得之瀹以皂角水少許鹽漬之即食味甚甘美江蟹大而肥實第殼軟漁人以為厭自云網中得蟹無魚可賣十年前土人亦不甚食近差珍貴嶽人以兔為地神無敢獵取者巴陵鴉甚多土人謂之神無敢弋者穿堂入庖厨略不畏園林果實未熟耗啄巳半故土人未嘗見成實之果半生半熟採之湖湘間賔客燕集供魚清羮則衆皆退如中州之水飯也馬援征諸溪蠻病死壺頭山民思之所到處祠廟具存至今婦人皆用方素蒙首屈兩角繫腦後云為伏波將軍持服鼎澧之民率皆如此巴陵江西及華容間民有皂者習俗巳久不可頓革問其故則曰去之則神怒立患頭疼殊不知去包裹自畏風寒也雖云風俗然用方素蒙首郡邑亦自當禁止江西婦人皆習男事採薪負重往往力勝男子設或不能則陰相詆誚衣服之上以帛為帶交結胸前後富者至用錦繡其實便操作也而自以為禮服其事甚著皆云武侯擒縱時所結人畏其威不敢輒去因以成俗巴陵江西華容之民猶間如此鼎澧亦然湖湘之民生男往往多作贅生女反招壻舍居然男子為其婦家承門户不憚勞苦無復怨悔俗之移人有如此者荆湖民俗歲時會集或禱祠多擊鼓令男女踏歌謂之歌場疾病不事醫藥惟灼龜打瓦或以雞子占卜求祟所在使俚巫治之親族不相視病而鄰里往往問勞之謂親戚視之則傳染鄰里則否死者多不埋葬或暴露風日或置之朩杪謂之死喪祥葬多舉樂飯僧鄂嶽之民生子計産授口有餘則殺之大抵類閩俗湖湘間南風三日則陂塘積水耗減已盡土人謂之南馬杓舟中有朱砂過洞庭多為風濤所苦相傳以為龍神所寶也載人柩者亦然近日扶柩過者往往少驚恐秋深洞庭水落皛皛皆陂濼衆魚所聚一夕風色便順則所得之魚厭飫鄰境湖上漁人有善沒者云洞庭湘湖夏秋水漲深不過數十尺而荆口水深一二百尺窮冬洞庭湖水巳退盡江湖寒洪在徒涉處得魚數百斤者而荆江魚重不過數十斤傍湘之民歲暮取江水一斗歲旦取江水一斗較其輕重則知其年水勢髙下云重則水大輕則水小甚驗江上漁人取江豚冬深水落視其絶沒處布網圍而取之無不獲或用鈎釣若鈎中喉吻雖巨綸亦掣斷或桂牙齒間則隨上下惟人所制略不頓掣然至腥臭不可近惟取脂油以供點照土人間有能食者江上漁人取巨魚以兩舟夾江以一人持綸鈎共一綸繫其兩端度江所宜用餘皆軸之中至十鈎有大如稱鈎皆相連每鈎相去一二尺鈎盡處各置黑鉛一斤形如錘以候水勢深淺錘上䇽以五寸許正鈎使欹側絶江往來牽挽以待魚行亟取之謂之擺鈎數舟聨比而下每中魚則候其緩急急則縱緩則收隨之上下待其力困然後引而取之至有相逐數日者雖數百斤之魚皆可鈎綸用一百二十絲成魚至大者力不能勝即以環循綸投副鈎助之亦須漁人得之於心應之於手也巴陵樂府舊傳臨江仙一闋滕子京所作其詞曰湖水連天天連水秋來分外澄清君山自是小蓬瀛氣蒸雲夢澤波撼嶽陽城帝子有靈能鼓瑟凄然依舊傷情微聞蘭芷動芳馨曲終人不見江上數峯青華容漢孱陵縣也或曰漢武陵縣地吳太皇帝分孱陵縣地於今縣東二里置安南縣或曰劉景升所置宋志為晉武帝分江安縣立也隋平陳改安南為華容縣屬羅州取古容城名之世傳為章華臺非也古章華在景陵界今監利縣離湖上與今邑相近耳大業三年以州為巴陵郡十年移縣於今地垂拱二年以犯武氏諱改為容城縣神龍元年又改為華容縣華容地皆面湖夏秋霖潦秋水時至建寧南堤決即被水患中民之産不過五十緡多以舟為居處隨水上下漁舟為業者十之四五所至為市謂之潭户其常産即湖地也華容令宅東北有老子祠曰大皇觀門之左右有二神像道家所謂青龍白虎也揑塑精巧非常人所能形質甚大可動搖遊觀者往往驗之以為異其實胎素中虗如夾紵作也祥符八年春二月既望雷震白虎西北楹上有倒書謝仙火字入朩踰分字畫遒徑人莫之測慶厯六年滕子京令摹而刻之問零陵何氏女俗謂之何仙姑者乃曰謝仙火雷部火神也兄弟二人各長三尺形質如玉好以鐵筆書字其字髙下當以身等驗之皆然東南楹亦有謝仙二字逼近柱礎又不知何也其後摹刻嶽陽樓上元豐二年嶽陽樓火土朩碑碣悉為煨燼惟此三字曾無少損至今尚存謝仙火與歐陽永叔所記大同小異永叔之説恐得之傳聞耳墨山謂之玄石山楚詞曰驅豫車於玄石步豫馬於洞庭大雲寺雲母泉李華詩序云洞庭湖西玄石山俗謂之墨山山之南有佛寺寺倚松嶺之下有雲母泉自泉口而流入渠周遍于庭發源如乳大旱不絶灌園浣濯皆用之自墨山西北至石門二十里間盡生雲母石其道路熒煌如列星又有寶慈觀乃張真人煉丹飛升之所弟子葬其衣冠俗謂之衣冠冢丹竈遺迹尚在仙廬峯左石臼二因岩石為之方臺山在縣南蕭城荆南志雲山出雲母土人採之先候雲所出處在其下掘之無不大獲有長五尺者可以為屛風當掘時有聲即粗惡也楊子洲洞庭記云此洲之間常苦蛟患昔荆佽飛將大霧渡江蛟夾船飛入水斬蛟而去今廟在洲上赤亭湖本赤湖梁太清六年湘東王遣胡僧祐陸法和誅侯景將任約於此為亭因名焉紫港湖在縣西今曰私港夏秋水漲與赤沙湖會北通于江今曰藕池南通于湖水經謂之港口御池在湖南出蚌珠有甚大者赤沙湖在縣南夏秋水漲與洞庭洪通杜甫道林嶽麓詩所謂殿角插入赤沙湖也水經云澧水上承孱陵縣淡水王仲宣曰悠悠淡澧口下會赤沙湖東南注于沅水謂之澧口離騷曰沅有芷兮澧有蘭注云洞庭謂之澧口江據此澧水會于沅然後入湖也今澧沅雖相通然澧水注于洞庭謂之澧口沅水注于洞庭謂之鼎江口豈歲月之久遂變遷至此耶禹山上有禹廟石佛山在縣北石堆成佛像衣服皆具平江本漢羅縣後分長沙為漢昌縣孫權於縣立漢昌郡以魯肅為大守改為吳昌縣隋平陳省於湘隂縣唐神龍三年又改為吳昌置城以界內昌江名之嘗𨽻潭今𨽻嶽後唐改平江其民善鬭訟有犯輒竄他界公事比之巴陵諸邑數倍幕阜山洞天天寶中改名昌江山幕阜山記曰山有石璧刻銘上言禹治水登此山高於平地一千八百丈周五百里二十四氣福德之鄉洪水之災居其上可以度世又有列仙之寶壇場在其側傍有竹兩本修翠猗然隨風掃拂其上有池水甚澄潔時有二魚遊泳其中有葛仙翁煉丹井藥臼尚存山無穢草惟杞與芳芎之屬有石山産如丹珠絶頂有石田數千畝塍渠隱然非人力所能為地絶高險莫能上有僧園曰長慶有宫曰玉清訪衆徒亦云鳥道斷絶不可登覽左黃龍右鳯凰皆在山麓也梅仙山在幕阜山之麓層巒疊嶂望之極蔥翠子真舊隱也有井曰子真丹井有水出焉謂之梅仙水連雲在幕阜之南峭拔萬丈常有雲氣覆其上有吳真人煉丹壇下有石壁廣數丈昔有田先生隱焉曰田翁嵒香爐山嵒在縣東下有老子祠上有丹壇丹竈有池歲旱祈禱有感有許旌陽試劒石龍隱洞在縣西北有影如繪畫望之鱗角皆具汨水出豫章界與純水合純水在縣南三十步石瀨廟乃關公廟湘州記云石子山溪西有小溪溪水映徹關公南征嘗憩此因以名瀨今廟亦以此名之隨軍土地三軍廟助順廟圖經皆以為關公并吕蒙行軍所置平江有李林甫墳在九峯劉光謙墳塔在長慶陳希烈墳塔在惠果陸善墳在芭蕉徐安貞墳塔在下臺今無遺迹但長慶有劉光謙繪像王文正公嘗宰平江令宅舊為山魈所據前令不復敢居一日吏或夢見其告者曰宰相至吾當避之如有影響相率而去巳而文正下車處正寢無復驚動前知公之貴也治有異政邑人為立生祠至今尚存臨湘縣本巴陵故地唐泰清年置王朝場以便人戶輸納皇朝淳化三年升為縣治至道二年改曰臨湘鴨欄磯建昌侯孫慮鬭鴨之所陸遜嘗諫止之與白螺山相望象骨山山海經云巴蛇吞象暴其骨於此山旁湖謂之象骨港烏石山仙隱嵒洞深數里有芝山石乳烏藥之屬烏黎口即烏林也酈善長云吳黃蓋敗魏武於烏林即其地也太平寰宇記引通典州郡録云曹州即曹公為吳所敗燒船處又云今鄂州蒲圻縣赤壁山即曹公敗處按三國志劉表率其子琮伐襄陽劉備屯樊口琮降曹公恐備先據江陵遣精騎急追及於當陽之長坂備數十騎走趨漢津濟沔到夏口曹公進軍江陵得劉琮水軍船數十萬自江陵止巴丘遂及赤壁孫權遣周瑜水軍數萬與備併力逆之曹公泊船江北岸瑜部將黃蓋詐降戰艦千艘因風放火曹公大敗從華容道步歸退保南郡周瑜等復追之曹公留曹仁守江陵城自徑北歸夏口今漢陽軍也而漢陽郡圖經云赤壁亦名烏林在郡西北二百二十里在漢陽縣西八十里皆誤也曹公既縱江陵水軍沿流巳至巴丘劉備在夏口孫權周瑜與劉併力逆曹公自當在巴陵江夏二郡界其漢陽圖經併俗説皆謬也嶽陽雖水鄉絶難得蓴菜惟臨湘東蓴湖間有之龍窖山在縣東南接鄂州崇陽縣雷家洞石門洞山極深遠其間居民謂之鳥鄉語言侏離以耕畬為業非市鹽茶不入城市邑亦無貢賦蓋山徭人也嶽州自元正獻歲鄰里以飮宴相慶至十二日罷謂其日為雲開節春社後遇好天色往往相繼上山中州人所謂拜掃也至寒食而止四月八日取羊桐葉淅米為飯以祀神及先祖瀕江諸廟皆有船四月中擇日下水擊畫鼓集人歌以棹之至端午罷其實競渡也而以為禳災民之有疾病者多就水際設神盤以祀神為酒肉以犒棹鼓者或為草船泛之謂之送瘟五月十三日謂之龍生日可種竹齊民要術所謂竹醉日也嶽陽風土記
