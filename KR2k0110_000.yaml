body:
  text: 嶽陽風土記地理類八雜記之屬提要臣等謹案嶽陽風土記一卷宋范致明撰致明字晦叔建安人元符中登進士是編乃其謫居嶽州以宣德即監商稅時所作不分門目隨事載記書雖一卷而於郡縣沿革山川改易古迹存亡考證特詳如樂史太平寰宇記謂大江流入洞庭致眀則謂洞庭會江江不入洞庭惟荆江夏秋暴漲乃逆泛而入之五日即還名曰翻流水圖經以鄭王廟為鄭德璘致眀則謂為隋末鄭文秀與董景珍同立蕭銑者故其北又有董王廟沈亞之湘中怨記嶽陽樓聞泛人之歌致眀則核以地形謂舟中之歌樓上不辨杜佑通典謂巴丘湖中有曹洲即曹公為吳所敗燒船處在今縣南四十里致明則謂今縣西但有曹公渡考之地理與周瑜曹操相遇處絶不相及漢陽圖經謂赤壁即烏林致明則謂曹操己至巴邱則孫劉宜拒之於巴陵江夏間所謂烏林即烏黎口夲不當在漢陽界世傳華容為章華臺致明則謂舊臺在景陵界華容隋縣乃取古容城名之鄭道元水經注謂澧水會沅然後入湖致明則謂澧沅雖相通而各自入湖澧所入處名澧口沅所入處名鼎江口皆確有引據異他地志之附會其餘軼聞逸事頗資採擇敘述尤為雅潔在宋人風土書中亦可謂佳夲矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:729c709a87fbdfe4a14a5b9f067bb6e43cc4aec5434cbd2848a212cdb270bd00
