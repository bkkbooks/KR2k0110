body:
  text: 岳陽風土記地理類八雜記之屬提要臣等謹案岳陽風土記一卷宋范致明撰致明字晦叔建安人元符中登進士是編乃其謫居岳州以宣徳即監商税時所作不分門目隨事載記書雖一卷而於郡縣沿革山川改易古蹟存亡考證特詳如樂史太平寰宇記謂大江流入洞庭致眀則謂洞庭㑹江江不入洞庭惟荆江夏秋暴漲乃逆泛而入之五日即還名曰翻流水圖經以鄭王廟為鄭徳璘致眀則謂為隋末鄭文秀與董景珍同立蕭銑者故其北又有董王廟沈亞之湘中怨記岳陽樓聞氾人之歌致眀則核以地形謂舟中之歌樓上不辨杜佑通典謂巴丘湖中有曹洲即曹公為呉所敗燒船處在今縣南四十里致明則謂今縣西但有􅈠公渡考之地理與周瑜􅈠操相遇處絶不相及漢陽圖經謂赤壁即烏林致明則謂􅈠操己至巴邱則孫劉宜拒之於巴陵江夏間所謂烏林即烏黎口夲不當在漢陽界世傳華容為章華臺致明則謂舊臺在㬌陵界華容隋縣乃取古容城名之鄭道元水經注謂澧水㑹沅然後入湖致明則謂澧沅雖相通而各自入湖澧所入處名澧口沅所入處名鼎江口皆確有引據異他地志之附㑹其餘軼聞逸事頗資採擇叙述尤為雅潔在宋人風土書中亦可謂佳夲矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7137328550b38fe79a85698e1349fe6fb1c4e95d1b5cb5cb796b266704ec049f
